<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏日升光學 - 社群連結導航</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a1930;
            --main-card-base: rgba(255, 255, 255, 0.01); 
            --glass-white: rgba(255, 255, 255, 0.03);
            --border-highlight: rgba(255, 255, 255, 0.08);
            --scroll-pos: 50%;

            --color-web: #00f2ff; 
            --color-line: #06c755;
            --color-fb: #1877f2;
            --color-ig: #e4405f;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% var(--scroll-pos), rgba(0, 242, 255, 0.1) 0%, transparent 75%),
                linear-gradient(135deg, rgba(125, 211, 252, 0.03) 25%, transparent 25%, transparent 50%, rgba(125, 211, 252, 0.03) 50%, rgba(125, 211, 252, 0.03) 75%, transparent 75%, transparent 100%);
            background-size: cover, 80px 80px;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .main-container {
            background: var(--main-card-base);
            max-width: 1100px;
            width: 100%;
            padding: 80px 40px;
            border-radius: 80px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 
                0 0 120px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            width: 105px; height: 105px;
            border-radius: 30px;
            background: #fff;
            padding: 8px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            object-fit: contain;
        }

        h1 {
            font-size: 2.7rem;
            letter-spacing: 15px;
            margin-bottom: 15px;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff 50%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 5px;
            margin-bottom: 70px;
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .qr-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 45px 20px;
            border-radius: 45px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .qr-item:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .qr-item i {
            font-size: 2.5rem;
            margin-bottom: 18px;
        }

        .qr-box {
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .qr-box img { width: 150px; height: 150px; display: block; }

        .action-btn {
            width: 85%;
            font-size: 0.9rem;
            padding: 11px 0;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .website:hover .action-btn { background: var(--color-web); color: #000; font-weight: bold; box-shadow: 0 0 25px var(--color-web); border-color: transparent; }
        .line:hover .action-btn { background: var(--color-line); color: #fff; box-shadow: 0 0 20px rgba(6, 199, 85, 0.5); border-color: transparent; }
        .facebook:hover .action-btn { background: var(--color-fb); color: #fff; box-shadow: 0 0 20px rgba(24, 119, 242, 0.5); border-color: transparent; }
        .instagram:hover .action-btn { background: var(--color-ig); color: #fff; box-shadow: 0 0 20px rgba(228, 64, 95, 0.5); border-color: transparent; }

        .website i { color: var(--color-web); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .line i { color: var(--color-line); }
        .facebook i { color: var(--color-fb); }
        .instagram i { color: var(--color-ig); }

        @media (max-width: 600px) {
            .main-container { padding: 50px 20px; border-radius: 0; background: transparent; backdrop-filter: none; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <img src="logo.png" alt="HRS Logo" class="brand-logo">
    <h1>宏日升光學</h1>
    <p class="subtitle">專業光學鏡片<br>掃描 QR Code 或點擊頁面與我們聯繫</p>

    <div class="qr-grid">
        <a href="http://comin.tw" class="qr-item website" target="_blank">
            <i class="fa-solid fa-globe"></i>
            <h3>官方網站</h3>
            <div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://comin.tw" alt="Web"></div>
            <div class="action-btn">前往瀏覽</div>
        </a>

        <a href="https://line.me/R/ti/p/@738nfoif" class="qr-item line" target="_blank">
            <i class="fa-brands fa-line"></i>
            <h3>LINE</h3>
            <div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://line.me/R/ti/p/@738nfoif" alt="LINE"></div>
            <div class="action-btn">加入好友</div>
        </a>

        <a href="https://www.facebook.com/share/17MJ18QCdR/" class="qr-item facebook" target="_blank">
            <i class="fa-brands fa-facebook"></i>
            <h3>Facebook</h3>
            <div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.facebook.com/share/17MJ18QCdR/" alt="FB"></div>
            <div class="action-btn">訪問專頁</div>
        </a>

        <a href="https://www.instagram.com/hrs.vision?igsh=MTBkc3ptaTl1Y2xqZg==" class="qr-item instagram" target="_blank">
            <i class="fa-brands fa-instagram"></i>
            <h3>Instagram</h3>
            <div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.instagram.com/hrs.vision?igsh=MTBkc3ptaTl1Y2xqZg==" alt="IG"></div>
            <div class="action-btn">追蹤動態</div>
        </a>
    </div>
</div>

<script>
    const updateScroll = () => {
        const scrolled = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const percentage = maxScroll > 0 ? (scrolled / maxScroll) * 100 : 50;
        document.documentElement.style.setProperty('--scroll-pos', `${percentage}%`);
    };
    window.addEventListener('scroll', updateScroll);
    window.addEventListener('resize', updateScroll);
    updateScroll();
</script>

</body>
</html>
