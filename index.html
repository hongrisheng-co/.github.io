<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏日升光學 - 官方社群連結</title>
    
    <meta property="og:title" content="宏日升光學">
    <meta property="og:description" content="專業光學鏡片·歡迎點擊連結與我們聯繫">
    <meta property="og:image" content="https://wind20000202.github.io/hrs-vision/logo.png">
    <meta property="og:url" content="https://wind20000202.github.io/hrs-vision/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --corp-bg: #0a1930; 
            --corp-light-blue: #7dd3fc; 
            --primary-text: #ffffff;
            --secondary-text: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(125, 211, 252, 0.15);
            --line-color: #06c755;
            --fb-color: #1877f2;
            --ig-color: #e4405f;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--corp-bg);
            background-image: 
                linear-gradient(135deg, rgba(125, 211, 252, 0.02) 25%, transparent 25%, transparent 50%, rgba(125, 211, 252, 0.02) 50%, rgba(125, 211, 252, 0.02) 75%, transparent 75%, transparent 100%);
            background-size: 120px 120px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--primary-text);
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(16, 43, 85, 0.4);
            padding: 3.5rem 2rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 960px;
            width: 100%;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(15px);
        }

        .logo-section { margin-bottom: 2.5rem; }
        .brand-logo {
            width: 90px; height: 90px;
            border-radius: 22px;
            background: white; padding: 5px;
            box-shadow: 0 0 25px rgba(125, 211, 252, 0.2);
            object-fit: contain;
        }

        h1 { font-size: 2.2rem; color: var(--corp-light-blue); letter-spacing: 3px; margin: 1.2rem 0 0.8rem; }
        .subtitle { color: var(--secondary-text); font-size: 1rem; margin-bottom: 3rem; font-weight: 300; line-height: 1.6; }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        .qr-card {
            background: var(--card-bg);
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s ease;
        }

        .qr-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }

        .qr-card h3 {
            margin: 0 0 1.8rem 0;
            font-size: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .qr-card h3 i {
            font-size: 2.2rem;
            line-height: 1;
        }

        .qr-code {
            width: 180px; height: 180px;
            background: white; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.8rem;
            padding: 10px;
        }
        .qr-code img { width: 100%; height: 100%; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 90%;
            padding: 0.9rem 0;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn i { font-size: 1.2rem; }

        .line h3 i, .line h3 span { color: var(--line-color); }
        .line .btn { background-color: var(--line-color); }
        
        .fb h3 i, .fb h3 span { color: var(--fb-color); }
        .fb .btn { background-color: var(--fb-color); }
        
        .ig h3 i, .ig h3 span { color: var(--ig-color); }
        .ig .btn { background-color: var(--ig-color); }

        .btn:hover { filter: brightness(1.1); transform: scale(1.05); }

        @media (max-width: 650px) {
            .qr-grid { gap: 1.5rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="logo-section">
        <img src="logo.png" alt="HRS Logo" class="brand-logo">
        <h1>宏日升光學</h1>
        <p class="subtitle">專業光學鏡片<br>掃描 QR Code 或點擊按鈕與我們聯繫</p>
    </header>

    <main class="qr-grid">
        <section class="qr-card line">
            <h3><i class="fa-brands fa-line"></i><span>LINE</span></h3>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://line.me/R/ti/p/@738nfoif" alt="LINE QR">
            </div>
            <a href="https://line.me/R/ti/p/@738nfoif" class="btn" target="_blank">
                <i class="fa-solid fa-user-plus"></i>加入好友
            </a>
        </section>

        <section class="qr-card fb">
            <h3><i class="fa-brands fa-facebook"></i><span>Facebook</span></h3>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.facebook.com/share/17MJ18QCdR/" alt="FB QR">
            </div>
            <a href="https://www.facebook.com/share/17MJ18QCdR/" class="btn" target="_blank">
                <i class="fa-solid fa-magnifying-glass"></i>瀏覽粉專
            </a>
        </section>

        <section class="qr-card ig">
            <h3><i class="fa-brands fa-instagram"></i><span>Instagram</span></h3>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.instagram.com/hrs.vision?igsh=MTBkc3ptaTl1Y2xqZg==" alt="IG QR">
            </div>
            <a href="https://www.instagram.com/hrs.vision?igsh=MTBkc3ptaTl1Y2xqZg==" class="btn" target="_blank">
                <i class="fa-solid fa-heart"></i>追蹤動態
            </a>
        </section>
    </main>
</div>

</body>
</html>
